apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: audit-system
type: Opaque
stringData:
  POSTGRESQL_USER: audit
  POSTGRESQL_PASSWORD: P@assw0rd
  POSTGRESQL_DATABASE: audit
  DATABASE_URL: "postgres://audit:P@assw0rd@audit-postgres:5432/audit?sslmode=disable"
---
apiVersion: v1
kind: Service
metadata:
  name: audit-postgres
  namespace: audit-system
spec:
  selector:
    app: audit-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: audit-postgres
  namespace: audit-system
spec:
  serviceName: audit-postgres
  replicas: 1
  selector:
    matchLabels:
      app: audit-postgres
  template:
    metadata:
      labels:
        app: audit-postgres
    spec:
      containers:
        - name: postgres
          image: quay.io/sclorg/postgresql-16-c9s:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_SHARED_BUFFERS
              value: "256MB"
            - name: POSTGRESQL_EFFECTIVE_CACHE_SIZE
              value: "512MB"
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            exec:
              command: ["/usr/libexec/check-container"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/usr/libexec/check-container", "--live"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 30Gi
